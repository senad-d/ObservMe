extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: /healthz

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 256
    spike_limit_mib: 64
  resource/observme:
    attributes:
      - key: telemetry.source
        value: observme
        action: upsert
      - key: service.name
        value: observme-pi-extension
        action: insert
      - key: service.namespace
        value: pi
        action: upsert
  resource/drop_high_cardinality_metric_attrs:
    attributes:
      - key: pi.workflow.id
        action: delete
      - key: pi.workflow.root_agent_id
        action: delete
      - key: pi.agent.id
        action: delete
      - key: pi.agent.parent_id
        action: delete
      - key: pi.agent.root_id
        action: delete
      - key: pi.agent.run.id
        action: delete
      - key: pi.agent.spawn.id
        action: delete
      - key: pi.agent.spawn.tool_call_id
        action: delete
      - key: pi.agent.child.id
        action: delete
      - key: pi.session.id
        action: delete
  # Drops accidental content attributes from logs. Intentional LLM content capture
  # is emitted as already-redacted log bodies and opt-in span attributes.
  attributes/drop_content_attributes:
    actions:
      - key: gen_ai.input.messages
        action: delete
      - key: gen_ai.output.messages
        action: delete
      - key: pi.llm.prompt.redacted
        action: delete
      - key: pi.llm.response.redacted
        action: delete
      - key: pi.llm.thinking.redacted
        action: delete
      - key: pi.tool.arguments.redacted
        action: delete
      - key: pi.tool.result.redacted
        action: delete
  attributes/loki_query_hints:
    actions:
      - key: loki.attribute.labels
        value: event.name,event.category,pi.session.id,pi.agent.id,pi.agent.parent_id,pi.agent.run.id,pi.llm.stop_reason,pi.bash.exit_code
        action: insert
  resource/loki_query_hints:
    attributes:
      - key: loki.resource.labels
        value: service.name
        action: insert
  batch:
    timeout: 5s
    send_batch_size: 8192

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    metric_expiration: 60m
    resource_to_telemetry_conversion:
      enabled: true
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource/observme, resource/drop_high_cardinality_metric_attrs, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/observme, resource/loki_query_hints, attributes/drop_content_attributes, attributes/loki_query_hints, batch]
      exporters: [loki]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/observme, batch]
      exporters: [otlp/tempo]

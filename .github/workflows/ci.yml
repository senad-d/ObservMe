name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate template
        run: npm run validate

  pi-compatibility:
    name: Pi ${{ matrix.pi-version }} compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        pi-version:
          - 0.80.5
          - 0.80.6

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install release dependencies
        run: npm ci --ignore-scripts

      - name: Install exact Pi compatibility target
        run: npm install --ignore-scripts --no-save --package-lock=false @earendil-works/pi-coding-agent@${{ matrix.pi-version }} @earendil-works/pi-ai@${{ matrix.pi-version }}

      - name: Verify exact Pi compatibility target
        env:
          EXPECTED_PI_VERSION: ${{ matrix.pi-version }}
        run: >-
          node -e 'for (const name of ["@earendil-works/pi-coding-agent", "@earendil-works/pi-ai"]) { const actual = require(`./node_modules/${name}/package.json`).version; if (actual !== process.env.EXPECTED_PI_VERSION) throw new Error(`${name}: expected ${process.env.EXPECTED_PI_VERSION}, got ${actual}`); }'

      - name: Validate Pi contracts, package, and real runtime
        run: npm run validate:pi-compatibility

  lease-cancellation:
    name: Active-agent lease cancellation
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      OBSERVME_COLLECTOR_IMAGE: otel/opentelemetry-collector-contrib:0.104.0
      OBSERVME_PROMETHEUS_IMAGE: prom/prometheus:v2.53.1

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run active-agent lease unit and contract tests
        run: npm run test:active-agent-lease:contracts

      - name: Simulate clean and abrupt producer termination
        run: npm run test:integration:active-agent-lease

      - name: Clean up active-agent lease Docker resources
        if: ${{ always() }}
        run: |
          docker ps --all --quiet --filter "label=io.observme.integration=active-agent-lease" \
            | xargs --no-run-if-empty docker rm --force --volumes
          docker network ls --quiet --filter "label=io.observme.integration=active-agent-lease" \
            | xargs --no-run-if-empty docker network rm
